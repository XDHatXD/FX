<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XDH Strategy vs SPY Benchmark</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0f1a; color: white; padding: 20px; }
        .container { max-width: 1150px; margin: auto; background: #111827; padding: 25px; border-radius: 12px; border: 1px solid #1e293b; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button.active { background: #3b82f6; color: white; border-color: #60a5fa; }
        .chart-wrapper { height: 550px; background: #1e293b; padding: 15px; border-radius: 8px; }
        .legend-info { display: flex; gap: 20px; margin-top: 15px; font-size: 12px; }
        .tag { padding: 4px 8px; border-radius: 4px; background: #0f172a; border-left: 3px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin:0 0 20px 0; color: #f8fafc;">Strategy Performance vs. SPY Benchmark</h2>

    <div class="controls" id="yearToggles"></div>

    <div class="chart-wrapper">
        <canvas id="mainChart"></canvas>
    </div>

    <div class="legend-info">
        <div class="tag" style="border-color: #ffffff;"><strong>Portfolio:</strong> 20% CHF | 20% TSLA, IAU, CVX, GD</div>
        <div class="tag" style="border-color: #a855f7;"><strong>Benchmark:</strong> SPY (S&P 500)</div>
    </div>
</div>

    },
    2025: { 
        SPY:[615,620,635,640,655,662,670,685,690,705,715,720],

        TSLA:[404,259,282,346,317,308,333,444,456,430,449,449],

        "CHF/USD":[1.13,1.12,1.14,1.15,1.16,1.17,1.16,1.15,1.16,1.18,1.19,1.18] 
    },
    2026: { 
        SPY:[725,735,748], 
        IAU:[101,98,104],

        CVX:[175,186,188], 
        GD:[351,357,343], 
        "CHF/USD":[1.18,1.19,1.21] 
    }

let myChart = null;

async function updateChart(year) {
    const datasets = [];
    const labels = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    let indexedResults = {};

    
        for (const key of tickers) {
        let dataArray = [...masterDb[year][key]];

        if (year === 2026 && key !== "CHF/USD") {
            try {
                const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${key}&token=${API_KEY}`);
                const d = await r.json();
                if (d.c) dataArray[dataArray.length - 1] = d.c;
            } catch (e) {}
        }

        const base = dataArray[0];
        const indexed = dataArray.map(v => (v / base) * 100);
        indexedResults[key] = indexed;

        // Custom styling for SPY
        const isSPY = (key === "SPY");

        datasets.push({
            label: key,
            data: indexed,
            borderColor: colors[key],
            // SPY is now significantly thicker
            borderWidth: isSPY ? 5 : (key === "CHF/USD" ? 1.5 : 1), 
            borderDash: key === "CHF/USD" ? [4, 4] : [],
            // Add markers only to SPY (and keep them for Portfolio later)
            pointRadius: isSPY ? 5 : 0, 
            pointBackgroundColor: colors[key],
            pointHoverRadius: 7,
            tension: 0.3
        });

    }

    // --- CALCULATE PORTFOLIO (Exclude SPY from weighting) ---
    const portfolioData = indexedResults["IAU"].map((_, i) => {
        return (
            (indexedResults["CHF/USD"][i] * 0.20) + 
            (indexedResults["TSLA"][i] * 0.20) + 
            (indexedResults["IAU"][i] * 0.20) + 
            (indexedResults["CVX"][i] * 0.20) + 
            (indexedResults["GD"][i] * 0.20)
        );
    });

    datasets.push({
        label: "STRATEGY PORTFOLIO",
        data: portfolioData,
        borderColor: colors["Portfolio"],
        borderWidth: 4,
        pointRadius: 4,
        tension: 0.3,
        zIndex: 10
    });

    const ctx = document.getElementById('mainChart').getContext('2d');
    if (myChart) myChart.destroy();

    myChart = new Chart(ctx, {
        type: 'line',
        data: { labels: labels.slice(0, datasets[0].data.length), datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { labels: { color: 'white', font: { weight: 'bold' } } }
            },
            scales: {
                y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } },
                x: { ticks: { color: '#94a3b8' } }
            }
        }
    });

    document.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.innerText == year));
}

const toggleDiv = document.getElementById('yearToggles');
[2020, 2021, 2022, 2023, 2024, 2025, 2026].forEach(y => {
    const b = document.createElement('button');
    b.innerText = y;
    b.onclick = () => updateChart(y);
    toggleDiv.appendChild(b);
});

window.onload = () => updateChart(2026);
</script>
</body>
</html>
