<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XDH 5-Asset Strategy vs SPY</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0f1a; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: #111827; padding: 25px; border-radius: 12px; border: 1px solid #1e293b; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.active { background: #3b82f6; color: white; border-color: #60a5fa; }
        .chart-wrapper { height: 600px; background: #1e293b; padding: 15px; border-radius: 8px; }
        .legend-info { display: flex; gap: 20px; margin-top: 15px; font-size: 12px; justify-content: space-between; }
        .tag { padding: 4px 8px; border-radius: 4px; background: #0f172a; border-left: 3px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin:0 0 10px 0; color: #f8fafc;">XDH 5-Asset Strategy (20% Weighting)</h2>
    <div class="controls" id="yearToggles"></div>
    <div class="chart-wrapper"><canvas id="mainChart"></canvas></div>
    <div class="legend-info">
        <div>
            <span class="tag" style="border-color: #ffffff;">Strategy & SPY Benchmark (Right Axis)</span>
            <span class="tag" style="border-color: #3b82f6; margin-left:10px;">5 Strategy Assets (Left Axis)</span>
        </div>
        <div style="color: #94a3b8;">*Assets: IAU, CVX, META, RTX, CHF (20% each)</div>
    </div>
</div>

<script>
const API_KEY = "d6qqkmpr01qgdhqc0ol0d6qqkmpr01qgdhqc0olg";
const benchmark = "SPY";
const strategyAssets = ["IAU", "CVX", "META", "RTX", "CHF/USD"];
const allTickers = [benchmark, ...strategyAssets];

const colors = { 
    "SPY": "#a855f7", "IAU": "#fbbf24", "CVX": "#3b82f6", 
    "META": "#06b6d4", "RTX": "#ef4444", "CHF/USD": "#10b981", 
    "Portfolio": "#ffffff" 
};

const masterDb = {
    2020: {
        SPY: [321, 297, 257, 290, 303, 308, 326, 349, 334, 326, 361, 373],
        IAU: [61, 61, 62, 65, 66, 68, 75, 75, 72, 72, 68, 73],
        CVX: [107, 93, 72, 92, 91, 89, 83, 83, 72, 69, 87, 84],
        META: [201, 192, 166, 204, 225, 227, 253, 293, 261, 263, 276, 273],
        RTX: [56, 53, 40, 48, 48, 47, 45, 46, 42, 39, 49, 54],
        "CHF/USD": [1.03, 1.04, 1.04, 1.03, 1.04, 1.05, 1.10, 1.11, 1.10, 1.09, 1.10, 1.13]
    },
    2021: {
        SPY: [370, 380, 396, 417, 420, 428, 438, 451, 430, 459, 456, 475],
        IAU: [71, 66, 64, 66, 71, 66, 68, 68, 66, 68, 69, 71],
        CVX: [85, 100, 104, 103, 103, 104, 101, 96, 101, 114, 112, 117],
        META: [258, 257, 294, 325, 328, 347, 356, 379, 339, 323, 324, 336],
        RTX: [51, 58, 61, 63, 71, 68, 70, 71, 71, 75, 69, 72],
        "CHF/USD": [1.12, 1.10, 1.06, 1.10, 1.11, 1.08, 1.10, 1.09, 1.08, 1.09, 1.08, 1.09]
    },
    2022: {
        SPY: [449, 437, 452, 412, 413, 377, 412, 395, 357, 386, 407, 382],
        IAU: [72, 76, 77, 76, 71, 69, 67, 65, 63, 63, 68, 71],
        CVX: [131, 144, 162, 156, 174, 144, 163, 158, 143, 180, 183, 179],
        META: [313, 203, 222, 200, 193, 161, 159, 162, 135, 93, 118, 120],
        RTX: [76, 82, 85, 80, 79, 76, 79, 76, 68, 80, 83, 85],
        "CHF/USD": [1.08, 1.09, 1.08, 1.03, 1.04, 1.02, 1.04, 1.02, 1.02, 1.00, 1.06, 1.08]
    },
    2023: {
        SPY: [406, 396, 410, 416, 417, 443, 457, 450, 427, 418, 456, 475],
        IAU: [76, 72, 79, 80, 78, 76, 80, 77, 74, 79, 81, 82],
        CVX: [174, 160, 163, 168, 150, 157, 163, 161, 168, 145, 143, 149],
        META: [148, 174, 211, 240, 264, 286, 318, 295, 300, 301, 327, 353],
        RTX: [85, 84, 83, 84, 78, 82, 73, 71, 61, 71, 70, 72],
        "CHF/USD": [1.10, 1.08, 1.10, 1.11, 1.10, 1.11, 1.14, 1.13, 1.10, 1.11, 1.14, 1.18]
    },
    2024: {
        SPY: [484, 508, 523, 501, 527, 544, 550, 563, 575, 573, 603, 586],
        IAU: [81, 81, 88, 92, 92, 92, 96, 99, 104, 107, 104, 104],
        CVX: [147, 152, 157, 161, 162, 156, 160, 147, 147, 148, 161, 144],
        META: [390, 484, 485, 432, 467, 504, 522, 521, 572, 591, 568, 592],
        RTX: [89, 91, 97, 101, 105, 102, 115, 119, 122, 125, 121, 124],
        "CHF/USD": [1.16, 1.13, 1.11, 1.09, 1.10, 1.12, 1.14, 1.18, 1.19, 1.16, 1.13, 1.15]
    },
    2025: {
        SPY: [608, 622, 631, 625, 642, 648, 655, 661, 658, 672, 680, 681],
        IAU: [102, 100, 105, 108, 106, 104, 108, 111, 114, 110, 106, 104],
        CVX: [149, 158, 167, 136, 132, 143, 151, 160, 155, 157, 151, 152],
        META: [601, 615, 630, 628, 645, 660, 672, 685, 680, 695, 710, 715],
        RTX: [126, 128, 130, 132, 135, 134, 138, 140, 139, 142, 145, 146],
        "CHF/USD": [1.18, 1.19, 1.21, 1.22, 1.21, 1.23, 1.25, 1.26, 1.25, 1.27, 1.28, 1.27]
    },
    2026: {
        SPY: [691, 705, 698], IAU: [105, 102, 108], CVX: [176, 186, 211],
        META: [720, 745, 730], RTX: [148, 151, 155], "CHF/USD": [1.28, 1.29, 1.31] 
    }
};

let myChart = null;

async function updateChart(year) {
    const labels = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    let indexedResults = {};
    const datasets = [];
    const livePrices = {};

    if (year === 2026) {
        await Promise.all([
            ...allTickers.filter(t => t !== "CHF/USD").map(async (s) => {
                try {
                    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${API_KEY}`);
                    const d = await r.json();
                    if (d.c) livePrices[s] = d.c;
                } catch (e) {}
            }),
            (async () => {
                try {
                    const r = await fetch(`https://api.frankfurter.app/latest?from=CHF&to=USD`);
                    const d = await r.json();
                    if (d.rates && d.rates.USD) livePrices["CHF/USD"] = d.rates.USD;
                } catch (e) {}
            })()
        ]);
    }

    // Process SPY and Strategy Assets
    allTickers.forEach(key => {
        let dataArray = [...(masterDb[year][key] || [])];
        if (year === 2026 && livePrices[key]) dataArray[3] = livePrices[key];
        
        const base = dataArray[0] || 1;
        const indexed = dataArray.map(v => (v / base) * 100);
        indexedResults[key] = indexed;

        const isBenchmark = (key === benchmark);
        datasets.push({
            label: key,
            data: indexed,
            borderColor: colors[key],
            borderWidth: isBenchmark ? 4 : 1.5,
            pointRadius: isBenchmark ? 4 : 0,
            yAxisID: isBenchmark ? 'yB' : 'yA', // Benchmark on Right
            tension: 0.3
        });
    });

    // Strategy Portfolio Calculation (20% each of the 5 strategy assets)
    const portfolioData = indexedResults[benchmark].map((_, i) => {
        const getV = (t) => indexedResults[t][i] !== undefined ? indexedResults[t][i] : indexedResults[t][indexedResults[t].length-1];
        
        // Sum of the 5 strategy assets * 0.2
        return strategyAssets.reduce((acc, ticker) => acc + (getV(ticker) * 0.20), 0);
    });

    datasets.push({
        label: "STRATEGY PORTFOLIO",
        data: portfolioData,
        borderColor: colors["Portfolio"],
        borderWidth: 5,
        pointRadius: 4,
        yAxisID: 'yB', // Portfolio on Right
        tension: 0.3,
        order: 1
    });

    const ctx = document.getElementById('mainChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: { labels: labels.slice(0, datasets[0].data.length), datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { 
                legend: { labels: { color: 'white', usePointStyle: true } },
                tooltip: { backgroundColor: '#1e293b' }
            },
            scales: {
                yA: { 
                    type: 'linear', display: true, position: 'left',
                    grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' },
                    title: { display: true, text: 'Constituent Assets (Index 100)', color: '#94a3b8' }
                },
                yB: { 
                    type: 'linear', display: true, position: 'right',
                    grid: { drawOnChartArea: false }, ticks: { color: '#ffffff' },
                    title: { display: true, text: 'Portfolio vs Benchmark', color: '#ffffff' }
                },
                x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
            }
        }
    });
    document.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.innerText == year));
}

Object.keys(masterDb).forEach(y => {
    const b = document.createElement('button');
    b.innerText = y;
    b.onclick = () => updateChart(y);
    document.getElementById('yearToggles').appendChild(b);
});
window.onload = () => updateChart(2026);
</script>
</body>
</html>
